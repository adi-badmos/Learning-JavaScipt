<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip</title>
</head>
<body>
    <p>
        <button onclick="
            playGame(0);
        ">heads</button>
        <button onclick="
            playGame(1);
        ">tails</button>
    </p>

    <p>
        <button onclick="
            score.wins = 0;
            score.losses = 0;
            localStorage.setItem('score', JSON.stringify(score));
            showResult();
        ">Clear</button>
    </p>

    <p id="result"></p>

    <script>
        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0
        };

        showResult();

        function guess() {
            return Math.floor(Math.random() * 2);
        }

        function playGame(userGuess) {
            let computerGuess = guess();

            let message = '';
            let result = '';

            let map = {
                0: 'heads',
                1: 'tails'
            }

            if(computerGuess === userGuess) {
                score.wins++;
                result = 'You won!';
            } else {
                score.losses++;
                result = 'You lost bitch!';
            }

            message = `You chose ${map[userGuess]}. Computer chose ${map[computerGuess]}.`

            localStorage.setItem('score', JSON.stringify(score));

            showResult(message, result);
        }

        function showResult(message = '', result = '') {
            document.getElementById("result").innerText = `${message}\n${result}\nWins: ${score.wins}, Losses: ${score.losses}`;
        }
    </script>
</body>
</html>
