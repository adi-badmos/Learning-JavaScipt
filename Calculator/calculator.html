<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <h1>Calculator</h1>
    <p class="calc display"></p>
    <p class="result display"></p>
    <p>
        <button class="black-button buttonz">7</button>
        <button class="black-button buttonz">8</button>
        <button class="black-button buttonz">9</button>
        <button class="orange-button buttonz">+</button>
    </p>

    <p>
        <button class="black-button buttonz">4</button>
        <button class="black-button buttonz">5</button>
        <button class="black-button buttonz">6</button>
        <button class="orange-button buttonz">-</button>
    </p>

    <p>
        <button class="black-button buttonz">1</button>
        <button class="black-button buttonz">2</button>
        <button class="black-button buttonz">3</button>
        <button class="orange-button buttonz">*</button>
    </p>

    <p> <button class="black-button buttonz">0</button>
        <button class="black-button buttonz">.</button>
        <button class="black-button equals">=</button>
        <button class="orange-button buttonz">/</button>
    </p>

    <p>
        <button class="black-button clear-button">Clear</button>
    </p>
    
    <script src="calculator.js"></script>
</body>
</html>
