<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
    <p id="calc"></p>
    <p id="result"></p>
    <p><button onclick="
            input('1');
        ">1</button>
        <button onclick="
            input('2');
        ">2</button>
        <button onclick="
            input('3');
        ">3</button>
       <button onclick="
            input('+');
        ">+</button>
    </p>

    <p><button onclick="
            input('4');
        ">4</button>
        <button onclick="
            input('5');
        ">5</button>
        <button onclick="
            input('6');
        ">6</button>
       <button onclick="
            input('-');
        ">-</button>
    </p>

    <p><button onclick="
            input('7');
        ">7</button>
        <button onclick="
            input('8');
        ">8</button>
        <button onclick="
            input('9');
        ">9</button>
       <button onclick="
            input('*');
        ">*</button>
    </p>

    <p><button onclick="
            input('0');
        ">0</button>
        <button onclick="
            input('.');
        ">.</button>
        <button onclick="
            if(!calculation) {
                return;
            }

            operator = false;
            try {
                result = eval(calculation);
                showCalc();
            } catch(e) {
                console.log(e);
                result = 'Error';

                showCalc(calculation);
                calculation = '';
            } showResult();
            
            console.log(result);
            if(result !== 'Error') {
                localStorage.setItem('lastCalc', calculation);
                localStorage.setItem('lastRes', result);
            }
        ">=</button>
       <button onclick="
            input('/');
        ">/</button>
    </p>

    <p>
        <button onclick="
            operator = false;

            calculation = '';
            localStorage.removeItem('lastCalc');

            result = '';
            localStorage.removeItem('lastRes');

            showCalc();
            showResult();

            console.clear();
        ">Clear</button>
    </p>
    

    <script src="calculator.js"></script>
</body>
</html>
