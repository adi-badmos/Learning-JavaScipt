<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
    <p><button onclick="
            input('1');
        ">1</button>
        <button onclick="
            input('2');
        ">2</button>
        <button onclick="
            input('3');
        ">3</button>
       <button onclick="
            input('+');
        ">+</button>
    </p>

    <p><button onclick="
            input('4');
        ">4</button>
        <button onclick="
            input('5');
        ">5</button>
        <button onclick="
            input('6');
        ">6</button>
       <button onclick="
            input('-');
        ">-</button>
    </p>

    <p><button onclick="
            input('7');
        ">7</button>
        <button onclick="
            input('8');
        ">8</button>
        <button onclick="
            input('9');
        ">9</button>
       <button onclick="
            input('*');
        ">*</button>
    </p>

    <p><button onclick="
            input('0');
        ">0</button>
        <button onclick="
            input('.');
        ">.</button>
        <button onclick="
            calculation = eval(calculation);
            console.log(calculation);
        ">=</button>
       <button onclick="
            input('/');
        ">/</button>
    </p>

    <button onclick="
        calculation = '';
        console.clear();
    ">Clear</button>

    <script>
        let calculation = '';

        function input(op) {
            if((op >= '0' && op <= '9') || op == '.') {
                calculation += op;
            } else {
                calculation += ' ' + op + ' ';
            } console.log(calculation);
        }
    </script>
</body>
</html>
