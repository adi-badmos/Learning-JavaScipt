<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h1>Rock Paper Scissors</h1>

    <p>
        <button onclick="
            playGame(0);
        ">Rock</button>

        <button onclick="
            playGame(1);
        ">Paper</button>

        <button onclick="
            playGame(2);
        ">Scissors</button>
    </p>

    <p id="score">Wins: 0, Losses: 0, Draws: 0</p>
    
    <script>
        let wins = 0;
        let losses = 0;
        let draws = 0;

        let message = '';

        function getRandom() {
            return Math.floor(Math.random() * 3);
        }

        function playGame(playerMove) {
            const kabutarMove = getRandom();

            if(playerMove === 0) {
                if(kabutarMove == 0) {
                    draws++;
                    message = `You chose Rock. Computer chose Rock.\nThat's a draw!`;
                } else if(kabutarMove == 1) {
                    losses++;
                    message = `You chose Rock. Computer chose Paper.\nYou lost bitch!`;
                } else {
                    wins++;
                    message = `You chose Rock. Computer chose Scissors.\nYou won!`;
                }
            } else if(playerMove === 1) {
                if(kabutarMove == 0) {
                    wins++;
                    message = `You chose Paper. Computer chose Rock.\nYou won!`;
                } else if(kabutarMove == 1) {
                    draws++;
                    message = `You chose Paper. Computer chose Paper.\nThat's a draw!`;
                } else {
                    losses++;
                    message = `You chose Paper. Computer chose Scissors.\nYou lost bitch!`;
                }
            } else if(playerMove === 2) {
                if(kabutarMove == 0) {
                    losses++;
                    message = `You chose Scissors. Computer chose Rock.\nYou lost bitch!`;
                } else if(kabutarMove == 1) {
                    wins++;
                    message = `You chose Scissors. Computer chose Paper.\nYou won!`;
                } else {
                    draws++;
                    message = `You chose Scissors. Computer chose Scissors.\nThat's a draw!`;
                }
            }

            updateMessage();
        }

        function updateMessage() {
            document.getElementById('score').innerText = `${message}\nWins: ${wins}, Losses: ${losses}, Draws: ${draws}`;
        }
    </script>
</body>
</html>
