<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rockPaperScissors.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <br>
    <p>
        <button class="move-button rock" onclick="
            playGame(0);
        ">✊🏻</button>

        <button class="move-button paper" onclick="
            playGame(1);
        ">🖐🏻</button>

        <button class="move-button scissors" onclick="
            playGame(2);
        ">✌🏻</button>
    </p>

    <br>
    <p class="score"></p>

    <br>
    <button class="reset-button" onclick="
        score.wins = 0;
        score.losses = 0;
        score.draws = 0;
        localStorage.removeItem('score');
        updateMessage();
    ">Reset Score</button>
    
    <script src="rockPaperScissors.js"></script>
</body>
</html>
