<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
</head>
<body>
    <h1>Cart</h1>

    <button class="add-to-cart" onclick="
        updateCartQuantity('add', 1);
    ">Add to Cart</button>
    
    <button onclick="
        updateCartQuantity('add', 2);
    ">+2</button>
    
    <button onclick="
        updateCartQuantity('add', 3);
    ">+3</button>

    <button onclick="
        updateCartQuantity('subtract', 1);
    ">Remove from cart</button>

    <button onclick="
        updateCartQuantity('subtract', 2);
    ">-2</button>

    <button onclick="
        updateCartQuantity('subtract', 3);
    ">-3</button>
    
    <button onclick="
        cartQuantity = 0;
        displayCart(`Cart was reset.`);
    ">Reset Cart</button>

    <p class="alert"></p>
    <p class="display-cart-quantity">Cart Quantity: 0</p>

    <script src="cart.js"></script>
</body>
</html>
