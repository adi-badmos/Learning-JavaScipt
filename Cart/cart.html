<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
</head>
<body>
    <h1>Cart</h1>
    
    <button onclick="
        displayCart();
    ">Show Quantity</button>

    <button onclick="
        updateCartQuantity('add', 1);
    ">Add to Cart</button>
    
    <button onclick="
        updateCartQuantity('add', 2);
    ">+2</button>
    
    <button onclick="
        updateCartQuantity('add', 3);
    ">+3</button>

    <button onclick="
        updateCartQuantity('subtract', 1);
    ">Remove from cart</button>

    <button onclick="
        updateCartQuantity('subtract', 2);
    ">-2</button>

    <button onclick="
        updateCartQuantity('subtract', 3);
    ">-3</button>
    
    <button onclick="
        cartQuantity = 0;
        console.log(`Cart was reset.`);
        displayCart();
    ">Reset Cart</button>

    <script>
        let cartQuantity = 0;

        function displayCart() {
            console.log(`Cart Quantity: ${cartQuantity}`);
        }

        function updateCartQuantity(operation, quantity) {
            if(operation === 'add') {
                if(cartQuantity + quantity > 10) {
                    console.log('The cart is full!');
                    return;
                } else {
                    cartQuantity += quantity;
                    displayCart();
                }
            } else if(operation === 'subtract') {
                if(cartQuantity < quantity) {
                    console.log('Not enough items in the cart!');
                } else {
                    cartQuantity -= quantity;
                    displayCart();
                }
            } else {
                alert('Invalid operation!');
                return;
            }
        }
    </script>
</body>
</html>
