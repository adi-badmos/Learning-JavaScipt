<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
</head>
<body>
    <h1>Cart</h1>

    <button onclick="
        updateCartQuantity('add', 1);
    ">Add to Cart</button>
    
    <button onclick="
        updateCartQuantity('add', 2);
    ">+2</button>
    
    <button onclick="
        updateCartQuantity('add', 3);
    ">+3</button>

    <button onclick="
        updateCartQuantity('subtract', 1);
    ">Remove from cart</button>

    <button onclick="
        updateCartQuantity('subtract', 2);
    ">-2</button>

    <button onclick="
        updateCartQuantity('subtract', 3);
    ">-3</button>
    
    <button onclick="
        cartQuantity = 0;
        displayCart(`Cart was reset.`);
    ">Reset Cart</button>

    <p class="alert"></p>
    <p class="display-cart-quantity">Cart Quantity: 0</p>

    <script>
        let cartQuantity = 0;

        displayCart();

        function displayCart(message = `<br>`) {
            let alertElement = document.querySelector('.alert');

            alertElement.innerHTML = message;

            let dispCart = document.querySelector('.display-cart-quantity');

            dispCart.innerText = `Cart Quantity: ${cartQuantity}`;
        }

        function updateCartQuantity(operation, quantity) {
            let message = `<br>`;

            if(operation === 'add') {
                if(cartQuantity + quantity > 10) {
                    message = 'The cart is full!';
                } else {
                    cartQuantity += quantity;
                }
            } else if(operation === 'subtract') {
                if(cartQuantity < quantity) {
                    message = 'Not enough items in the cart!';
                } else {
                    cartQuantity -= quantity;
                }
            } else {
                message = 'Invalid operation!';
            } displayCart(message);
        }
    </script>
</body>
</html>
