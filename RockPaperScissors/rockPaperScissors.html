<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rockPaperScissors.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    
    <br>
    <p>
        <button class="move-button rock">✊🏻</button>
        <button class="move-button paper">🖐🏻</button>
        <button class="move-button scissors">✌🏻</button>
    </p>

    <br>
    <p class="score"></p>

    <br>
    <button class="reset-button">Reset Score</button>
    <button class="auto-play-button">Auto Play</button>
    
    <script src="rockPaperScissors.js"></script>
</body>
</html>
